<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 720" role="img" aria-labelledby="title desc">
  <title id="title">Electric monster truck sauna</title>
  <desc id="desc">A cedar sauna cabin riding on an electric monster truck with steam, glowing windows, and giant tires.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0" stop-color="#fb923c" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#fb7185" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="woodA" x1="0" x2="1" y1="0" y2="0">
      <stop stop-color="#8f421c"/>
      <stop offset="0.5" stop-color="#d98a45"/>
      <stop offset="1" stop-color="#a45122"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" x2="1" y1="0" y2="0">
      <stop stop-color="#0f172a"/>
      <stop offset="0.5" stop-color="#475569"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="window" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#fff7ed"/>
      <stop offset="0.48" stop-color="#fdba74"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="26" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="planks" width="52" height="220" patternUnits="userSpaceOnUse">
      <rect width="52" height="220" fill="url(#woodA)"/>
      <rect x="49" width="3" height="220" fill="#5f2914" opacity="0.55"/>
      <path d="M13 18c12 28 9 57-2 86m28-73c-16 33-14 75 1 116" stroke="#ffd7aa" stroke-opacity="0.18" stroke-width="5" stroke-linecap="round" fill="none"/>
    </pattern>
  </defs>

  <rect width="920" height="720" rx="54" fill="url(#bg)"/>
  <ellipse cx="460" cy="625" rx="330" ry="48" fill="#020617" opacity="0.38"/>

  <g opacity="0.85" filter="url(#glow)">
    <path d="M222 260c-42-69 44-91 5-156" stroke="#fff7ed" stroke-opacity="0.24" stroke-width="35" stroke-linecap="round" fill="none"/>
    <path d="M438 230c-58-92 58-119 2-204" stroke="#fff7ed" stroke-opacity="0.25" stroke-width="42" stroke-linecap="round" fill="none"/>
    <path d="M668 262c50-74-54-103 7-176" stroke="#fff7ed" stroke-opacity="0.22" stroke-width="35" stroke-linecap="round" fill="none"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="635" y="160" width="58" height="122" rx="18" fill="#2d1b12"/>
    <rect x="154" y="230" width="612" height="242" rx="40" fill="url(#planks)"/>
    <rect x="154" y="230" width="612" height="242" rx="40" fill="none" stroke="#ffedd5" stroke-opacity="0.2" stroke-width="8"/>
    <path d="M176 230h568l-48-76H224z" fill="#633016"/>
    <path d="M224 154h472" stroke="#ffedd5" stroke-opacity="0.18" stroke-width="8" stroke-linecap="round"/>

    <rect x="232" y="297" width="126" height="86" rx="22" fill="url(#window)" filter="url(#glow)"/>
    <path d="M295 302v78M238 340h112" stroke="#431407" stroke-opacity="0.42" stroke-width="7"/>
    <rect x="576" y="286" width="116" height="164" rx="24" fill="url(#window)" filter="url(#glow)"/>
    <circle cx="665" cy="370" r="8" fill="#431407" opacity="0.66"/>
    <text x="244" y="444" fill="#2b160d" opacity="0.62" font-size="72" font-family="Inter, Arial, sans-serif" font-weight="900" letter-spacing="-8">SaaS</text>

    <rect x="113" y="468" width="694" height="70" rx="35" fill="url(#metal)"/>
    <rect x="196" y="512" width="528" height="26" rx="13" fill="#020617" opacity="0.7"/>
    <path d="M198 486h510" stroke="#94a3b8" stroke-opacity="0.32" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g filter="url(#softShadow)">
    <circle cx="245" cy="568" r="84" fill="#020617"/>
    <circle cx="245" cy="568" r="58" fill="#111827" stroke="#475569" stroke-width="18"/>
    <circle cx="245" cy="568" r="24" fill="#fdba74" filter="url(#glow)"/>
    <circle cx="675" cy="568" r="84" fill="#020617"/>
    <circle cx="675" cy="568" r="58" fill="#111827" stroke="#475569" stroke-width="18"/>
    <circle cx="675" cy="568" r="24" fill="#fdba74" filter="url(#glow)"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="460" cy="546" r="48" fill="#fdba74"/>
    <path d="M470 510l-48 57h39l-13 56 55-72h-40z" fill="#1c100a"/>
  </g>

  <g fill="none" stroke="#fdba74" stroke-width="10" stroke-linecap="round" opacity="0.72">
    <path d="M108 592c-42 0-64-15-78-37"/>
    <path d="M812 592c42 0 64-15 78-37"/>
  </g>
</svg>
